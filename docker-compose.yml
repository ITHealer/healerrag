# HealerRAG — Full Stack (Production)
# Usage: cp .env.example .env && docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: healerrag-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: healerrag
    ports:
      - "5002:5432"
    volumes:
      - healerrag_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: healerrag-chromadb
    ports:
      - "8002:8000"
    volumes:
      - healerrag_chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: healerrag-backend
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    env_file: .env
    environment:
      # Override for Docker internal networking
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5002/healerrag
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    volumes:
      - healerrag_uploads:/app/backend/uploads
      - healerrag_data:/app/backend/data
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # Needed on Linux so Ollama (on host) is reachable at host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

